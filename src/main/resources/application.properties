spring.profiles.default=${SPRING_PROFILES_DEFAULT:prod}

server.port=${PORT:${SERVER_PORT:8080}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jackson.time-zone=${SPRING_JACKSON_TIME_ZONE:America/Santiago}

app.jwt.secret=${APP_JWT_SECRET:bWlfY2xhdmVfc2VjcmV0YV9wYXJhX2Rlc2Fycm9sbG9fMTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.frontend.reset-url=${APP_FRONTEND_RESET_URL:http://localhost:4200/reset-password?token=%s}
app.mail.from=${APP_MAIL_FROM:no-reply@mantenweb.local}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

management.health.mail.enabled=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
